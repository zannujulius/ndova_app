services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://zannu:zameron14@postgres:5432/ndova_db
      DB_SSL: "false"
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      BCRYPT_SALT_ROUNDS: 10
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npm run db:migrate:docker &&
             npm run db:seed:docker &&
             node dist/server.js"
    networks:
      - ndova-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zannu
      POSTGRES_PASSWORD: zameron14
      POSTGRES_DB: ndova_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ndova-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zannu -d ndova_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  ndova-network:
    driver: bridge
